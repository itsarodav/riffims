<section class="home">
  <!-- 1. Section header -->
  <div class="home__header">
    <h1 class="home__heading">Tus lanzamientos</h1>
    <a *ngIf="hasReleases" class="home__create-btn" routerLink="/nuevo">Crear</a>
  </div>

  <!-- 2a. Release empty state (no releases) -->
  <a *ngIf="!loading && !hasReleases" class="home__release-empty" routerLink="/nuevo">
    <div class="home__release-icon">
      <app-icon name="add-circle-filled" [size]="32" />
    </div>
    <p class="home__release-title">¡Crea tu primer lanzamiento!</p>
    <p class="home__release-subtitle">Tú decides, yo te acompaño. Y termina cada paso para aumentar de nivel</p>
  </a>

  <!-- 2b. Release cards (has releases) -->
  <div *ngIf="hasReleases" class="home__releases">
    <app-release-card
      *ngFor="let release of releases"
      [title]="release.name"
      [releaseType]="getDisplayType(release.release_type)"
      [daysToRelease]="getDaysToRelease(release)"
      [completedLevels]="release.completed_levels"
      [fullWidth]="releases.length === 1"
      (click)="openReleasePath(release)"
      (keydown.enter)="openReleasePath(release)"
      role="link"
      tabindex="0"
      style="cursor: pointer"
    />
  </div>

  <!-- 3. Riffi tip card -->
  <app-multi-card
    variant="riffi-tip"
    iconName="riffi-v0"
    [iconSize]="32"
    title="Riffi tip del día"
    description="&quot;Publica contenido detrás de cámaras en la semana previa a tu lanzamiento. La anticipación mueve más que el anuncio.&quot;"
  />

  <!-- 4. Cover preview card (enlace a /cover-preview) -->
  <a class="home__card-link" routerLink="/cover-preview">
    <app-multi-card
      variant="feature"
      iconName="music-album"
      [iconSize]="32"
      title="Cover preview"
      description="Mira cómo quedaría tu portada en un reproductor de streaming, antes de publicarla."
    />
  </a>

  <!-- 5. Grid 2 columns -->
  <div class="home__grid">
    <app-multi-card
      variant="feature"
      iconName="badge"
      [iconSize]="32"
      title="Tus logros"
      description="Echa un vistazo a todo lo que has logrado en tus lanzamientos."
    />
    <app-multi-card
      variant="feature"
      iconName="riffionario"
      [iconSize]="32"
      title="Riffionario"
      description="Tu diccionario de industria musical. Contratos, publishing, distribución... explicado fácil."
    />
  </div>
</section>
