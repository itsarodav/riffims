<div class="riffi-page">
  <header class="riffi-page__header">
    <a class="riffi-page__back" routerLink="/home">
      <app-icon name="arrow-left" [size]="24" />
    </a>
    <div class="riffi-page__logo">
      <app-icon name="logo-riffims" [size]="40" />
    </div>
    <button class="riffi-page__help">
      <app-icon name="help" [size]="24" />
    </button>
  </header>

  <div class="riffi-page__body" #messagesContainer>
    @if (!riffi.hasMessages()) {
      <div class="riffi-page__welcome">
        <h2 class="riffi-page__greeting">¡Hey, {{ displayName }} está aquí!</h2>
        <p class="riffi-page__subtitle">¿Cómo puedo ayudarte hoy?</p>

        <div class="riffi-page__actions">
          <button class="riffi-page__chip riffi-page__chip--tip" (click)="onChip('tip')">
            <app-icon name="riffi-v0" [size]="16" />
            <span>Dame un Riffi tip</span>
          </button>
          <button class="riffi-page__chip riffi-page__chip--riffionario" (click)="onChip('riffionario')">
            <app-icon name="riffionario" [size]="16" />
            <span>Palabra de Riffionario</span>
          </button>
          <button class="riffi-page__chip riffi-page__chip--idea" (click)="onChip('idea')">
            <app-icon name="idea" [size]="16" />
            <span>Idea para lanzamiento</span>
          </button>
        </div>
      </div>
    }

    <div class="riffi-page__messages">
      @for (msg of riffi.messages(); track msg.timestamp) {
        <div class="riffi-page__message riffi-page__message--{{ msg.role }}">
          {{ msg.content }}
        </div>
      }

      @if (riffi.loading()) {
        <div class="riffi-page__typing">Riffi está escribiendo...</div>
      }

      @if (riffi.error()) {
        <div class="riffi-page__error">{{ riffi.error() }}</div>
      }
    </div>
  </div>

  <div class="riffi-page__input-area">
    <input
      class="riffi-page__input"
      [(ngModel)]="userInput"
      placeholder="Pregúntale a Riffi"
      maxlength="500"
      [disabled]="riffi.loading()"
      (keyup.enter)="send()"
    />
    <div class="riffi-page__input-actions">
      <button class="riffi-page__input-btn">
        <app-icon name="add-circle" [size]="24" />
      </button>
      <button class="riffi-page__input-btn">
        <app-icon name="emoji-happy" [size]="24" />
      </button>
      <button class="riffi-page__input-btn">
        <app-icon name="mic" [size]="24" />
      </button>
      <button class="riffi-page__send-btn" (click)="send()" [disabled]="riffi.loading()">
        <app-icon name="arrow-up" [size]="24" />
      </button>
    </div>
  </div>
</div>
