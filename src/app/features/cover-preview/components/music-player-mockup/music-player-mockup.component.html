<article #playerRoot class="player" role="img" aria-label="Vista previa de portada musical">
  <!-- Badge -->
  <div class="player__badge">
    <span class="player__badge-text">Cover Preview</span>
  </div>

  <!-- Cover Art -->
  <div
    class="player__cover"
    [class.player__cover--empty]="!coverImageUrl"
    role="button"
    tabindex="0"
    [attr.aria-label]="coverImageUrl ? 'Cambiar portada' : 'Subir portada'"
    (click)="onCoverClick()"
    (keydown.enter)="onCoverClick()"
    (keydown.space)="onCoverClick(); $event.preventDefault()"
  >
    <img
      *ngIf="coverImageUrl"
      class="player__cover-image"
      [src]="coverImageUrl"
      alt="Portada del lanzamiento"
      crossorigin="anonymous"
    />
    <div *ngIf="!coverImageUrl" class="player__cover-placeholder">
      <app-icon name="add-circle-filled" [size]="40" />
    </div>
  </div>

  <!-- Track Info -->
  <div class="player__info">
    <!-- Shuffle icon -->
    <svg class="player__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <div class="player__track">
      <input
        *ngIf="editable"
        class="player__title-input"
        type="text"
        [ngModel]="songTitle"
        (ngModelChange)="onTitleInput($event)"
        aria-label="Título de canción"
        placeholder="Título de canción"
      />
      <span *ngIf="!editable" class="player__title" [class.player__title--placeholder]="!songTitle">{{ songTitle || 'Título de canción' }}</span>

      <input
        *ngIf="editable"
        class="player__artist-input"
        type="text"
        [ngModel]="artistName"
        (ngModelChange)="onArtistInput($event)"
        aria-label="Nombre de artista"
        placeholder="Nombre de artista"
      />
      <span *ngIf="!editable" class="player__artist" [class.player__artist--placeholder]="!artistName">{{ artistName || 'Nombre de artista' }}</span>
    </div>

    <!-- Add icon -->
    <svg class="player__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="10" stroke="white" stroke-width="1.5"/>
      <path d="M12 8v8M8 12h8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Progress Bar -->
  <div class="player__progress" aria-hidden="true">
    <div class="player__progress-bar">
      <div class="player__progress-fill"></div>
    </div>
    <div class="player__times">
      <span class="player__time">2:38</span>
      <span class="player__time">-0:50</span>
    </div>
  </div>

  <!-- Transport Controls -->
  <div class="player__controls" aria-hidden="true">
    <!-- Previous -->
    <svg class="player__control" width="32" height="32" viewBox="0 0 24 24" fill="none">
      <path d="M19 20L9 12l10-8v16zM5 4v16" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <!-- Play -->
    <svg class="player__control player__control--play" width="48" height="48" viewBox="0 0 24 24" fill="none">
      <path d="M8 5v14l11-7L8 5z" fill="white"/>
    </svg>

    <!-- Next -->
    <svg class="player__control" width="32" height="32" viewBox="0 0 24 24" fill="none">
      <path d="M5 4l10 8-10 8V4zM19 4v16" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</article>
