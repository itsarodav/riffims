<main class="register-container" aria-labelledby="register-title">

    <h1 id="register-title" class="sr-only">Crear cuenta</h1>

    <header class="register-container__logo">
        <img src="assets/icons/logo-riffims.svg" alt="Riffims" />
    </header>

    <form
        class="register-container__form"
        (ngSubmit)="onRegister()"
        novalidate
    >
        <fieldset class="register-container__inputs">
            <legend class="sr-only">Datos de tu cuenta</legend>

            <app-input
                type="email"
                label="Email"
                placeholder="Email"
                autocomplete="email"
                name="email"
                [hideLabel]="true"
                [required]="true"
                [(value)]="email"
            />

            <app-input
                type="password"
                label="Contraseña"
                placeholder="Password"
                autocomplete="new-password"
                name="password"
                [hideLabel]="true"
                [required]="true"
                [(value)]="password"
            />

            <div class="terms">
                <input
                    type="checkbox"
                    id="terms"
                    [(ngModel)]="acceptedTerms"
                    name="terms"
                />
                <label for="terms">
                    Al crear esta cuenta estás de acuerdo con nuestros
                    <a href="/terms">términos de uso</a> y nuestra
                    <a href="/privacy">política de privacidad</a>
                </label>
            </div>
        </fieldset>

        <output
            class="register-container__error"
            role="alert"
            *ngIf="errorMessage"
        >
            {{ errorMessage }}
        </output>

        <div class="register-container__actions">
            <app-button
                type="submit"
                variant="primary"
                [disabled]="isLoading || !acceptedTerms"
            >
                {{ isLoading ? 'Creating account...' : 'Create an account' }}
            </app-button>

            <app-button variant="tertiary" (click)="goToLogin()">
                Have an account? Log in here
            </app-button>
        </div>
    </form>

</main>
