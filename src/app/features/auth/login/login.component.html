<main class="login-container" aria-labelledby="login-title">

    <h1 id="login-title" class="sr-only">Iniciar sesión</h1>

    <header class="login-container__logo">
        <img src="assets/icons/logo-riffims.svg" alt="Riffims" />
    </header>

    <form
        class="login-container__form"
        (ngSubmit)="onLogin()"
        novalidate
    >
        <fieldset class="login-container__inputs">
            <legend class="sr-only">Credenciales de acceso</legend>

            <app-input
                type="email"
                label="Email"
                placeholder="Email"
                autocomplete="email"
                name="email"
                [hideLabel]="true"
                [required]="true"
                [(value)]="email"
            />

            <app-input
                type="password"
                label="Contraseña"
                placeholder="Password"
                autocomplete="current-password"
                name="password"
                [hideLabel]="true"
                [required]="true"
                [(value)]="password"
            />
        </fieldset>

        <output
            class="login-container__error"
            role="alert"
            *ngIf="errorMessage"
        >
            {{ errorMessage }}
        </output>

        <div class="login-container__actions">
            <app-button type="submit" variant="primary" [disabled]="isLoading">
                {{ isLoading ? 'Entrando...' : 'Log in' }}
            </app-button>

            <app-button variant="secondary" (click)="goToForgotPassword()">
                Forgot Password
            </app-button>

            <app-button variant="tertiary" (click)="goToRegister()">
                Create Account
            </app-button>
        </div>
    </form>

</main>
