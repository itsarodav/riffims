<main class="login-container" aria-labelledby="login-title">

    <h1 id="login-title" class="sr-only">Iniciar sesión</h1>

    <header class="login-container__logo">
        <img src="assets/icons/logo-riffims.svg" alt="Riffims" />
    </header>

    <!-- novalidate porque gestiono la validación desde Angular -->
    <form
        class="login-container__form"
        (ngSubmit)="onLogin()"
        novalidate
    >

        <fieldset class="login-container__inputs">
        <legend class="sr-only">Credenciales de acceso</legend>

        <label for="email" class="sr-only">Email</label>
        <input
            id="email"
            class="input-field"
            type="email"
            placeholder="Email"
            autocomplete="email"
            [(ngModel)]="email"
            name="email"
            required
        />

        <label for="password" class="sr-only">Contraseña</label>
        <input
            id="password"
            class="input-field"
            type="password"
            placeholder="Password"
            autocomplete="current-password"
            [(ngModel)]="password"
            name="password"
            required
        />
        </fieldset>

        <output
        class="login-container__error"
        role="alert"
        *ngIf="errorMessage"
        >
        {{ errorMessage }}
        </output>

        <!-- acciones dentro del form -->
        <div class="login-container__actions">

        <button
            type="submit"
            class="btn btn--primary"
            [disabled]="isLoading"
        >
            {{ isLoading ? 'Entrando...' : 'Log in' }}
        </button>

        <button
            type="button"
            class="btn btn--secondary"
            (click)="goToForgotPassword()"
        >
            Forgot Password
        </button>

        <button
            type="button"
            class="btn btn--tertiary"
            (click)="goToRegister()"
        >
            Create Account
        </button>
        </div>
    </form>

</main>
