<div
  class="avatar"
  [style.width.px]="size()"
  [style.height.px]="size()"
>
  @if (src()) {
    <img
      class="avatar__img"
      [src]="src()"
      alt="Avatar del usuario"
    />
  } @else {
    <svg
      class="avatar__fallback"
      viewBox="0 0 40 40"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <circle cx="20" cy="16" r="7" fill="#a1a1aa" />
      <ellipse cx="20" cy="34" rx="13" ry="10" fill="#a1a1aa" />
    </svg>
  }
</div>
