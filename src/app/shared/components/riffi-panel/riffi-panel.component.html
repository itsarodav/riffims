<aside class="riffi-panel">
  @if (!riffi.hasMessages()) {
    <div class="riffi-panel__header">
      <h2 class="riffi-panel__greeting">¡Hey, {{ userName() }} está aquí!</h2>
      <p class="riffi-panel__subtitle">¿Cómo puedo ayudarte hoy?</p>

      <div class="riffi-panel__actions">
        <button class="riffi-panel__chip riffi-panel__chip--tip" (click)="onChip('tip')">
          <app-icon name="riffi-v0" [size]="16" />
          <span>Dame un Riffi tip</span>
        </button>
        <button class="riffi-panel__chip riffi-panel__chip--riffionario" (click)="onChip('riffionario')">
          <app-icon name="riffionario" [size]="16" />
          <span>Palabra de Riffionario</span>
        </button>
        <button class="riffi-panel__chip riffi-panel__chip--idea" (click)="onChip('idea')">
          <app-icon name="idea" [size]="16" />
          <span>Idea para lanzamiento</span>
        </button>
      </div>
    </div>
  }

  <div class="riffi-panel__messages" #messagesContainer>
    @for (msg of riffi.messages(); track msg.timestamp) {
      <div class="riffi-panel__message riffi-panel__message--{{ msg.role }}">
        {{ msg.content }}
      </div>
    }

    @if (riffi.loading()) {
      <div class="riffi-panel__typing">Riffi está escribiendo...</div>
    }

    @if (riffi.error()) {
      <div class="riffi-panel__error">{{ riffi.error() }}</div>
    }
  </div>

  <div class="riffi-panel__input-area">
    <input
      class="riffi-panel__input"
      [(ngModel)]="userInput"
      placeholder="Pregúntale a Riffi"
      maxlength="500"
      [disabled]="riffi.loading()"
      (keyup.enter)="send()"
    />
    <div class="riffi-panel__input-actions">
      <button class="riffi-panel__input-btn">
        <app-icon name="add-circle" [size]="24" />
      </button>
      <button class="riffi-panel__input-btn">
        <app-icon name="emoji-happy" [size]="24" />
      </button>
      <button class="riffi-panel__input-btn">
        <app-icon name="mic" [size]="24" />
      </button>
      <button class="riffi-panel__send-btn" (click)="send()" [disabled]="riffi.loading()">
        <app-icon name="arrow-up" [size]="24" />
      </button>
    </div>
  </div>
</aside>
