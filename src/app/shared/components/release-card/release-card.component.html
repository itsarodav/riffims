<div class="release-card">

    <!-- Icono del tipo de lanzamiento -->
    <div class="release-card__icon">
        <svg-icon src="assets/icons/release-folder.svg"></svg-icon>
    </div>

    <!-- Título y badge de tipo -->
    <div class="release-card__info">
        <p class="release-card__title">{{ title }}</p>
        <span class="release-card__badge">{{ releaseType }}</span>
    </div>

    <!-- Metadatos: countdown y niveles -->
    <div class="release-card__meta">
        <div class="release-card__meta-item">
        <svg-icon src="assets/icons/calendar.svg"></svg-icon>
        <span class="release-card__meta-text">{{ daysToRelease }} días para el lanzamiento</span>
        </div>
        <div class="release-card__meta-item">
        <svg-icon src="assets/icons/check-filled.svg"></svg-icon>
        <span class="release-card__meta-text">{{ completedLevels }} niveles completados</span>
        </div>
    </div>

</div>
