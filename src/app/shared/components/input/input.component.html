<div class="input-field">
  <label
    [for]="inputId"
    class="input-field__label"
    [class.sr-only]="hideLabel"
    *ngIf="label"
  >
    {{ label }}
  </label>

  <input
    [id]="inputId"
    class="input-field__control"
    [class.input-field__control--error]="error"
    [type]="type"
    [placeholder]="placeholder"
    [autocomplete]="autocomplete"
    [name]="name"
    [required]="required"
    [disabled]="disabled"
    [ngModel]="value"
    (ngModelChange)="onInput($event)"
  />

  <p class="input-field__hint" *ngIf="hint && !error">{{ hint }}</p>
  <p class="input-field__error" role="alert" *ngIf="error">{{ error }}</p>
</div>
