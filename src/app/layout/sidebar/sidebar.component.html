<aside class="sidebar">
  <div class="sidebar__logo">
    <img src="assets/icons/logo-riffims.svg" alt="Riffims" width="96">
  </div>

  <nav class="sidebar__nav">
    <a class="sidebar__link" routerLink="/home" routerLinkActive="sidebar__link--active">
      <app-icon name="home" [size]="24" />
      <span>Inicio</span>
    </a>
    <a class="sidebar__link" routerLink="/lanzamientos" routerLinkActive="sidebar__link--active">
      <app-icon name="music-album" [size]="24" />
      <span>Lanzamientos</span>
    </a>
    <a class="sidebar__link" routerLink="/riffionario" routerLinkActive="sidebar__link--active">
      <app-icon name="riffionario" [size]="24" />
      <span>Riffionario</span>
    </a>
    <a class="sidebar__link" routerLink="/cover-preview" routerLinkActive="sidebar__link--active">
      <app-icon name="music-album" [size]="24" />
      <span>Cover Preview</span>
    </a>
  </nav>

  <div class="sidebar__footer">
    <p class="sidebar__invite-text">¿Nos ayudas a llegar a más músicos?</p>
    <button class="sidebar__invite-btn">Invitar amigos</button>
  </div>
</aside>
