<!-- Desktop: Navbar top -->
<app-navbar />

<div class="app-shell">
  <!-- Desktop: Sidebar left -->
  <app-sidebar />

  <!-- Main scrollable area -->
  <div class="app-shell__main" [class.app-shell__main--no-bottom-pad]="isFormRoute || isRiffiRoute || isCoverPreviewRoute">
    <!-- Mobile: Header scrolls with content -->
    <app-mobile-header *ngIf="!isFormRoute && !isRiffiRoute && !isCoverPreviewRoute && !isReleasePathRoute" />

    <div class="app-shell__content" [class.app-shell__content--flush]="isRiffiRoute || isCoverPreviewRoute">
      <router-outlet />
    </div>
  </div>

  <!-- Desktop: Riffi panel right -->
  <app-riffi-panel *ngIf="!isFormRoute && !isRiffiRoute && !isCoverPreviewRoute" class="app-shell__riffi" />
</div>

<!-- Mobile: Bottom nav fixed -->
<app-bottom-nav *ngIf="!isFormRoute && !isRiffiRoute && !isCoverPreviewRoute" />
